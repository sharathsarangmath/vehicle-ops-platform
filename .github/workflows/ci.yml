name: VOP CI Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:

  test:
    name: Run API Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          pip install pytest requests python-dotenv playwright pytest-playwright
          playwright install chromium

      - name: Run Playwright API tests
        env:
          API_BASE_URL: ${{ secrets.API_BASE_URL }}
        run: |
          cd playwright_api_tests
          pytest -v

  docker:
    name: Build Docker Image
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Build Docker image
        run: |
          docker build -t vop-local-api ./local_api

      - name: Verify image exists
        run: docker images vop-local-api