name: VOP CI Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:

  api-tests:
    name: Run API Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          pip install pytest requests python-dotenv playwright pytest-playwright
          playwright install chromium

      - name: Run API tests
        env:
          API_BASE_URL: ${{ secrets.API_BASE_URL }}
        run: |
          cd playwright_api_tests
          pytest test_health.py \
                 test_get_all_vehicle_data.py \
                 pages/test_get_all_vehicle_alerts.py \
                 pages/test_post_telemetry.py \
                 pages/test_post_invalid_telemetry.py \
                 -v

  ui-tests:
    name: Run UI Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          pip install pytest playwright pytest-playwright
          playwright install chromium

      - name: Find dashboard
        run: find . -name "index.html"

      - name: Start dashboard server
        run: |
          python3 -m http.server 3000 --directory services/dashboard &
          sleep 3

      - name: Verify server running
        run: curl -s http://localhost:3000 | head -5

      - name: Run UI tests
        env:
          API_BASE_URL: ${{ secrets.API_BASE_URL }}
        run: |
          cd playwright_api_tests
          pytest test_dashboards_ui.py -v

  docker:
    name: Build Docker Image
    runs-on: ubuntu-latest
    needs: api-tests

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Build Docker image
        run: docker build -t vop-local-api ./local_api

